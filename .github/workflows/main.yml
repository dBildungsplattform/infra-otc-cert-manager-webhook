name: Publish Docker image
on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'  
  workflow_dispatch:
        
jobs:
  push_to_registry:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf #v6.0.0
        with:
          images: |
            dBildungsplattform/infra-otc-cert-manager-webhook
          tags: |
            type=sha        
            type=semver,pattern={{version}}
      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 #v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Push to Docker Hub
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f8 #v7.1.0
        with:
          push: true
          tags: dBildungsplattform/infra-otc-cert-manager-webhook:latest,${{ steps.meta.outputs.tags }}
