name: Release Charts

on:
  push:
    branches:
      #- main
      - DBP-2194-infra-otc-cert-manager-webhook-übergabefähig-machen
    #paths:
    #  - 'deploy/infra-otc-cert-manager-webhook'
      
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          fetch-depth: 0
      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"      
      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 #v5.0.0 
        with:
          version: 3.4.0 #renovate: datasource=github-releases depName=helm/helm

      #- name: Add external Helm repos
      #  run: helm repo add bitnami https://charts.bitnami.com/bitnami
      # No chart dependencies to build. So left out here.

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f #v1.7.0
        with:
          charts_dir: deploy
          # config: 
          # charts_repo_url: https://<owner>.github.io/<project>
        env:
          CR_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
