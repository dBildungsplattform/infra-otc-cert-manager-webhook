apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-certificate-examplesubdomain
  namespace: examplesubdomain
spec:
  # commonName: *.examplesubdomain.dBildungsplattform.dev
  dnsNames:
  - '*.examplesubdomain.dbildungsplattform.dev'
  - '*.dev.examplesubdomain.dbildungsplattform.dev'
  issuerRef:
    kind: ClusterIssuer
    name: sc-cert-manager-clusterissuer-letsencrypt-otcdns
  secretName: wildcard-certificate-examplesubdomain-tls
